name: SoccerSub
options:
  bundleIdPrefix: com.soccermom
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  SoccerSub:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SoccerSub
        excludes:
          - Tests/**
    settings:
      base:
        SWIFT_VERSION: "5"
        PRODUCT_BUNDLE_IDENTIFIER: com.soccermom.SoccerSub
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: SoccerSub

  SoccerSubTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SoccerSub/Tests
    dependencies:
      - target: SoccerSub
    settings:
      base:
        SWIFT_VERSION: "5"
        PRODUCT_BUNDLE_IDENTIFIER: com.soccermom.SoccerSubTests
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: YES
